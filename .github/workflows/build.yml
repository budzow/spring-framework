name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Runs at 00:00 every day
    - cron: '0 0 * * *'

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Build (Assemble)
        run: ./gradlew assemble

      - name: Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Calculate Day of Year (1-366) and strip leading zeros
          DAY_OF_YEAR=$(date +%j | sed 's/^0*//')
          
          # Calculate Memory (512 + Day of Year)
          MEM=$((512 + DAY_OF_YEAR))
          
          echo "Day of year: $DAY_OF_YEAR"
          echo "Setting Xmx to: ${MEM}m"
          
          # Export Java Opts for the Scanner
          export SONAR_SCANNER_JAVA_OPTS="-Xmx${MEM}m"
          
          # Run Sonar target with dynamic versioning
          ./gradlew sonar -Dsonar.projectVersion=$DAY_OF_YEAR --d
